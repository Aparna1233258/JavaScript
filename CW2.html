<!DOCTYPE html>
<html>
<head>
  <title>CW2</title>
</head>
<body>

  <h1>Library Book</h1>
  <p id="output"></p>

  <script>
    let book = {
      title: "The Alchemist",
      author: "Paulo Coelho",
      year: 1988,

      getSummary: function () {
        return "The book '" + this.title + "' was written by " +
               this.author + " in " + this.year + ".";
      }
    };

    function printBookSummary(bookObj) {
      document.getElementById("output").textContent = bookObj.getSummary();
    }

    printBookSummary(book);
  </script>

</body>
</html>
