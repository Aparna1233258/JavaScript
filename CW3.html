<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CW3</title>
</head>
<body>
    <h2>Feedback Form</h2>

    <p id="result"></p>

    <script>
        var feedback = "   I loved the FOOD and the service!   ";
        feedback = feedback.trim();
        feedback = feedback.toLowerCase();
        feedback = feedback.replace("food", "ambience");
        var position = feedback.indexOf("service");
        var wordsArray = feedback.split(" ");

        document.getElementById("result").innerHTML =
    "string: " + feedback + "<br>" +
    "Position of 'service': " + position + "<br>" +
    "Array: ["+ wordsArray.join(", ") + "]";
</script>
        

</body>
</html>
